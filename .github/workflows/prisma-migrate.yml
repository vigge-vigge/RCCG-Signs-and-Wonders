name: "Prisma Migrate & Seed"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  migrate:
    name: Run Prisma migrations and seed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations (deploy) or fallback to db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          echo "Attempting to run 'npx prisma migrate deploy'..." | tee migrate.log
          if npx prisma migrate deploy 2>&1 | tee -a migrate.log; then
            echo "migrate deploy succeeded" | tee -a migrate.log
          else
            echo "migrate deploy failed — falling back to 'npx prisma db push'" | tee -a migrate.log
            npx prisma db push 2>&1 | tee -a migrate.log
          fi
          # ensure migrate.log is printed to the action log as well
          cat migrate.log

      - name: Run seed (if present)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_ADMIN_EMAIL: ${{ secrets.NEXTAUTH_ADMIN_EMAIL }}
          NEXTAUTH_ADMIN_PASSWORD_HASH: ${{ secrets.NEXTAUTH_ADMIN_PASSWORD_HASH }}
        run: |
          # Run seed script (prisma db seed) and capture output to seed.log
          echo "Running prisma db seed..." | tee seed.log
          npx prisma db seed 2>&1 | tee -a seed.log || true
          cat seed.log

      - name: Upload Prisma logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prisma-logs
          path: |
            migrate.log
            seed.log
