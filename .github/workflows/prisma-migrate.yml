name: "Prisma Migrate & Seed"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  diagnose:
    name: Diagnose DB connectivity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run connectivity checks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          echo "Diagnosing DB connectivity..." > diagnose.log
          echo "Date: $(date -u)" >> diagnose.log
          HOST="${DATABASE_URL#*@}"
          HOST="${HOST%%[:/?#]*}"
          echo "Host resolved from DATABASE_URL: $HOST" >> diagnose.log
          echo "nslookup for $HOST:" >> diagnose.log
          nslookup "$HOST" >> diagnose.log 2>&1 || true
          echo "Attempt TCP connect via python3" >> diagnose.log
          python3 -c "
          import socket, os, re
          url = os.environ.get('DATABASE_URL', '')
          m = re.search(r'@([^:/?#]+)', url)
          host = m.group(1) if m else None
          if not host:
              print('No host extracted')
              raise SystemExit(2)
          sock = socket.socket()
          sock.settimeout(8)
          try:
              sock.connect((host, 5432))
              print('TCP CONNECT SUCCESS to', host)
          except Exception as e:
              print('TCP CONNECT FAILED:', e)
          finally:
              sock.close()
          " >> diagnose.log 2>&1 || true

      - name: Upload diagnose log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnose-log
          path: diagnose.log

  migrate:
    name: Run Prisma migrations and seed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations (deploy) or fallback to db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          echo "Attempting to run 'npx prisma migrate deploy'..." | tee migrate.log
          if npx prisma migrate deploy 2>&1 | tee -a migrate.log; then
            echo "migrate deploy succeeded" | tee -a migrate.log
          else
            echo "migrate deploy failed - falling back to npx prisma db push" | tee -a migrate.log
            npx prisma db push 2>&1 | tee -a migrate.log
          fi
          cat migrate.log

      - name: Run seed (if present)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_ADMIN_EMAIL: ${{ secrets.NEXTAUTH_ADMIN_EMAIL }}
          NEXTAUTH_ADMIN_PASSWORD_HASH: ${{ secrets.NEXTAUTH_ADMIN_PASSWORD_HASH }}
        run: |
          echo "Running prisma db seed..." | tee seed.log
          npx prisma db seed 2>&1 | tee -a seed.log || true
          cat seed.log

      - name: Upload Prisma logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prisma-logs
          path: |
            migrate.log
            seed.log
